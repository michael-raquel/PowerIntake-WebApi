name: Deploy PowerIntake WebAPI to Azure App Service

on:
  push:
    branches:
      - main
      - uat
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. (Optional) Run tests ──────────────────────────────────────────────
      # - name: Run tests
      #   run: npm test

      # ── 5. Determine deployment slot based on branch ─────────────────────────
      - name: Set deployment slot
        id: set-slot
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "slot_name=production" >> $GITHUB_OUTPUT
            echo "slot_url=https://powerintake.azurewebsites.net" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref_name }}" == "uat" ]]; then
            echo "slot_name=uat" >> $GITHUB_OUTPUT
            echo "slot_url=https://powerintake-uat.azurewebsites.net" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "slot_name=dev" >> $GITHUB_OUTPUT
            echo "slot_url=https://powerintake-dev.azurewebsites.net" >> $GITHUB_OUTPUT
          fi

      # ── 6. Login to Azure using App Registration ─────────────────────────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      # ── 7. Deploy to the correct App Service slot ────────────────────────────
      - name: Deploy PowerIntake WebAPI to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'powerintake'
          slot-name: ${{ steps.set-slot.outputs.slot_name }}
          package: .

      # ── 8. Print deployed URL ────────────────────────────────────────────────
      - name: Print deployed URL
        run: |
          echo "✅ Branch '${{ github.ref_name }}' deployed to: ${{ steps.set-slot.outputs.slot_url }}"
